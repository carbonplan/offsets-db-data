name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

  schedule:
    - cron: '0 5 * * *' # At 05:00

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

env:
  AWS_DEFAULT_REGION: us-west-2

jobs:
  unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}

      - name: List packages
        run: pixi list

      - name: Run unit tests
        run: pixi run test-cov

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        shell: bash -l {0}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::631969445205:role/github-action-role
          role-session-name: offsets-db-audit-role-session
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: false

      - name: Resolve latest S3 data date
        run: |
          LATEST=$(aws s3 ls s3://carbonplan-offsets-db/raw/ | awk '{print $2}' | sort | tail -1 | tr -d '/')
          if [[ -z "$LATEST" ]]; then
            echo "ERROR: no dated prefixes found under s3://carbonplan-offsets-db/raw/"
            exit 1
          fi
          echo "S3_DATA_DIR=s3://carbonplan-offsets-db/raw/$LATEST" >> "$GITHUB_ENV"

      - name: Run mapping coverage audit
        run: |
          set +e
          OUTPUT=$(pixi run audit --data-dir "$S3_DATA_DIR" 2>/dev/null)
          EXIT=$?
          echo "$OUTPUT"
          printf '## Mapping Coverage Audit\n\n**Data:** `%s`\n\n```\n%s\n```\n' "$S3_DATA_DIR" "$OUTPUT" >> "$GITHUB_STEP_SUMMARY"
          echo "$OUTPUT" > audit-report.txt
          exit $EXIT

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_id }}
          path: audit-report.txt
          retention-days: 30

  integration:
    runs-on: ubuntu-latest
    needs: unit-test
    timeout-minutes: 120
    defaults:
      run:
        shell: bash -l {0}
    services:
      openrefine:
        image: abesesr/openrefine:3.8.7
        ports:
          - 3333:3333
        options: --name openrefine
    steps:
      - uses: actions/checkout@v4

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::631969445205:role/github-action-role
          role-session-name: offsets-db-etl-role-session
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          cache: true
          cache-write: false

      - name: List packages
        run: pixi list

      - name: Install CLI
        run: pixi run offsets-db-data-orcli install --destination /usr/local/bin

      - name: Show CLI help
        run: pixi run offsets-db-data-orcli --help

      - name: Run integration tests
        run: pixi run test-integration
